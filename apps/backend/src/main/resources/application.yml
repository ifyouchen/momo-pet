server:
  port: 8080

spring:
  application:
    name: momo-backend
  datasource:
    url: jdbc:h2:file:./data/momo-pet;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.company.momo: DEBUG
